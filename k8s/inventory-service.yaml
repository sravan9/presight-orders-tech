apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: presight
  labels:
    app: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: presight/inventory-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: INVENTORY_LOW-STOCK-THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: inventory-config
                  key: INVENTORY_LOW_STOCK_THRESHOLD
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config-volume
          configMap:
            name: inventory-config
            items:
              - key: application.yml
                path: application.yml
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: presight
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
