apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: presight
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: presight/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: "http://order-service.presight.svc.cluster.local:8081"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: "http://inventory-service.presight.svc.cluster.local:8082"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: presight
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
