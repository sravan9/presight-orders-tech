server:
  port: ${PORT:8082}
  forward-headers-strategy: framework

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:h2:mem:inventorydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

inventory:
  low-stock-threshold: 10

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoint:
    env:
      post:
        enabled: true
    refresh:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,refresh,env
